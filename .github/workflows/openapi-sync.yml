name: OpenAPI Sync

on:
  pull_request:
    paths:
      - ".github/workflows/openapi-sync.yml"
      - "anilibria_api_client/**"
      - "pyproject.toml"
      - "tests/test_generated_openapi.py"
  push:
    branches:
      - main
    paths:
      - ".github/workflows/openapi-sync.yml"
      - "anilibria_api_client/**"
      - "pyproject.toml"
      - "tests/test_generated_openapi.py"
  schedule:
    - cron: "0 5 * * 1"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  validate-generated:
    if: github.event_name == 'pull_request' || github.event_name == 'push'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .[dev]

      - name: Check if generated code is up to date
        id: check
        run: |
          python anilibria_api_client/types/scripts/check_codegen.py
        continue-on-error: true

      - name: Fail if out of date
        if: steps.check.outcome == 'failure'
        run: |
          echo "Generated OpenAPI artifacts are out of date"
          exit 1

      - name: Run smoke tests
        run: python -m pytest tests/test_generated_openapi.py -q

  refresh-generated:
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .[dev]

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Update schema and generated code
        run: python anilibria_api_client/types/scripts/update_openapi_models.py

      - name: Run smoke tests
        run: python -m pytest tests/test_generated_openapi.py -q

      - name: Check for changes
        id: changes
        run: |
          if git diff --quiet; then
            echo "no_changes=true" >> $GITHUB_OUTPUT
            echo "No changes detected"
          else
            echo "no_changes=false" >> $GITHUB_OUTPUT
            echo "Changes detected:"
            git status --short
          fi

      - name: Create pull request
        if: steps.changes.outputs.no_changes == 'false'
        uses: peter-evans/create-pull-request@v7
        with:
          branch: codex/openapi-sync
          base: main
          title: "chore: refresh OpenAPI generated artifacts"
          body: |
            Automated OpenAPI refresh

            ## Changes
            - Updated OpenAPI schema from AniLiberty
            - Regenerated `_generated/openapi_models.py`
            - Updated public facades (`models.py`, `types.py`)

            This PR was automatically generated. Review and merge if tests pass.**Автоматическое обновление OpenAPI**
          commit-message: "chore: refresh OpenAPI generated artifacts [skip ci]"
          delete-branch: true
          labels: automated, openapi-sync
