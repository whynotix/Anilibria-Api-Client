name: OpenAPI Sync

on:
  pull_request:
    paths:
      - ".github/workflows/openapi-sync.yml"
      - "scripts/**"
      - "anilibria_api_client/_generated/**"
      - "anilibria_api_client/models.py"
      - "anilibria_api_client/types.py"
      - "pyproject.toml"
      - "tests/test_generated_openapi.py"
      - "schema/**"
  push:
    branches:
      - main
    paths:
      - ".github/workflows/openapi-sync.yml"
      - "scripts/**"
      - "anilibria_api_client/_generated/**"
      - "anilibria_api_client/models.py"
      - "anilibria_api_client/types.py"
      - "pyproject.toml"
      - "tests/test_generated_openapi.py"
      - "schema/**"
  schedule:
    - cron: "0 5 * * 1"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  validate-generated:
    if: github.event_name == 'pull_request' || github.event_name == 'push'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .[dev]

      - name: Check schema drift
        run: python scripts/check_schema_drift.py

      - name: Run smoke tests
        run: python -m pytest tests/test_generated_openapi.py -q

  refresh-generated:
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .[dev]

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Update OpenAPI schema and generate models
        run: python scripts/update_openapi_models.py

      - name: Run smoke tests
        run: python -m pytest tests/test_generated_openapi.py -q

      - name: Check for changes
        id: check_changes
        run: |
          if [[ -n $(git status -s) ]]; then
            echo "changes=true" >> $GITHUB_OUTPUT
            echo "Changes detected:"
            git status -s
          else
            echo "changes=false" >> $GITHUB_OUTPUT
            echo "No changes detected"
          fi

      - name: Commit and push changes
        if: steps.check_changes.outputs.changes == 'true'
        run: |
          git add schema/anilibria-v1.openapi.json
          git add anilibria_api_client/_generated/openapi_models.py
          git add anilibria_api_client/models.py
          git add anilibria_api_client/types.py
          git commit -m "chore: refresh OpenAPI generated artifacts [skip ci]"
          git push origin HEAD:codex/openapi-sync

      - name: Create pull request
        if: steps.check_changes.outputs.changes == 'true'
        uses: peter-evans/create-pull-request@v7
        with:
          branch: codex/openapi-sync
          base: main
          title: "chore: refresh OpenAPI generated artifacts"
          body: |
            Automated OpenAPI refresh

            ## Changes
            - Updated OpenAPI schema from AniLiberty
            - Regenerated `_generated/openapi_models.py`
            - Updated public facades (`models.py`, `types.py`)

            This PR was automatically generated. Review and merge if tests pass.
          commit-message: "chore: refresh OpenAPI generated artifacts [skip ci]"
          delete-branch: true
          labels: |
            automated
            openapi-sync
