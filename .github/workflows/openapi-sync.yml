name: OpenAPI Sync

on:
  pull_request:
    paths:
      - ".github/workflows/openapi-sync.yml"
      - "scripts/**"
      - "anilibria_api_client/_generated/**"
      - "anilibria_api_client/models.py"
      - "anilibria_api_client/types.py"
      - "pyproject.toml"
      - "tests/test_generated_openapi.py"
      - "schema/**"
  push:
    branches:
      - main
    paths:
      - ".github/workflows/openapi-sync.yml"
      - "scripts/**"
      - "anilibria_api_client/_generated/**"
      - "anilibria_api_client/models.py"
      - "anilibria_api_client/types.py"
      - "pyproject.toml"
      - "tests/test_generated_openapi.py"
      - "schema/**"
  schedule:
    - cron: "0 5 * * 1"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  validate-generated:
    if: github.event_name == 'pull_request' || github.event_name == 'push'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .[dev]

      - name: Check schema drift
        id: check
        run: |
          python scripts/check_schema_drift.py
        continue-on-error: true

      - name: Show drift details
        if: steps.check.outcome == 'failure'
        run: |
          echo "⚠️ Schema drift detected!"
          echo "The generated code doesn't match the current OpenAPI schema."
          echo "Run 'python scripts/update_openapi_models.py' locally to regenerate."
          git diff --stat
          exit 1

      - name: Run smoke tests
        run: python -m pytest tests/test_generated_openapi.py -q

  refresh-generated:
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .[dev]

      - name: Update OpenAPI schema and generate models
        run: python scripts/update_openapi_models.py

      - name: Run smoke tests
        run: python -m pytest tests/test_generated_openapi.py -q

      - name: Detect changes
        id: diff
        shell: bash
        run: |
          if git diff --quiet -- \
            schema/anilibria-v1.openapi.json \
            anilibria_api_client/_generated/openapi_models.py \
            anilibria_api_client/models.py \
            anilibria_api_client/types.py; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "Changes detected in:"
            git diff --name-only
          fi

      - name: Create pull request
        if: steps.diff.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v7
        with:
          branch: codex/openapi-sync
          commit-message: "chore: refresh OpenAPI generated artifacts"
          title: "chore: refresh OpenAPI generated artifacts"
          body: |
            Automated OpenAPI refresh.

            ## What changed:
            - Fetched latest OpenAPI schema from AniLiberty
            - Regenerated models in `_generated/openapi_models.py`
            - Updated public facades (`models.py`, `types.py`)
            - Smoke tests passed

            ## Files updated:
            - `schema/anilibria-v1.openapi.json`
            - `anilibria_api_client/_generated/openapi_models.py`
            - `anilibria_api_client/models.py`
            - `anilibria_api_client/types.py`

            ⚠️ **Note**: Manual changes in `methods/` and legacy DTOs are preserved.
          delete-branch: true
          labels: |
            automated-pr
            openapi-sync
