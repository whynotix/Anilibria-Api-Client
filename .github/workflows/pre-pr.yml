name: pre-pr check

on:
  pull_request:
    branches: [ main, dev ]
  push:
    branches: [ main ]

jobs:
  pre-pr-tests:
    name: Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install dotenv pytest pytest-asyncio

      - name: Create .env file
        run: |
          echo "ANILIBRIA_API_TOKEN=${{ secrets.ANILIBRIA_API_TOKEN }}" > .env

      - name: Run tests with pytest
        run: |
          pytest -q tests/ -s
