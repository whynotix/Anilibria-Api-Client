name: style ruff

on:
  workflow_dispatch:
    inputs:
      branch:
        description: "Branch to fix"
        required: true
        default: "main"

jobs:
  fix-style:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.branch }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install ruff
        run: pip install ruff

      - name: Fix and commit
        run: |
          ruff check --fix .
          ruff format .
          git config user.name "ruffcheckbot"
          git add -A
          git diff --staged --quiet || git commit -m "style: ruff [ruffcheckbot ci/cd]"
          git push
